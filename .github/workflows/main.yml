name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.gitignore'
      - 'examples/**'
      - 'README.md'
  pull_request:
    branches-ignore:
      - 'future'
    paths-ignore:
      - '.gitignore'
      - 'examples/**'
      - 'README.md'

permissions:
  contents: read

env:
  MAVEN_ARGS: --show-version --batch-mode --no-transfer-progress

jobs:
  build:
    name: Build (${{ matrix.os }} - JDK ${{ matrix.jdk }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        jdk: [ 17, 21, 25 ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.jdk }}
          distribution: 'temurin'
          cache: maven

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        run: mvn clean install -DallTests -Pdist '-Dskip.container.tests=true'

      - name: Build and test (Unix)
        if: runner.os != 'Windows'
        run: mvn clean install -DallTests -Pdist '-Dskip.container.tests=false'

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: surefire-reports-${{ matrix.os }}-jdk${{ matrix.jdk }}
          path: '**/surefire-reports/*.txt'
          retention-days: 7

  pmd:
    name: ubuntu-latest-pmd
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run PMD Check
        run: mvn pmd:aggregate-pmd-check -DskipTests

      - name: Upload PMD Report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: pmd-reports
          path: 'target/pmd.xml'
          retention-days: 7
      - name: Display report
        if: failure()
        run: |
          if [[ -f target/pmd.xml ]]; then
            cat target/pmd.xml
          else
            echo "PMD report not found"
          fi